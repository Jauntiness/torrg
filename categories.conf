# torbox-fast Kategorien — zurg-Stil mit GRUPPEN.
#
# Aufbau:
#   [gruppe]
#   kategorie = regex
#   ...
#
#   - regex = Python-Regex, IMMER case-insensitive; geprueft gegen Release-Name + Dateinamen
#   - SCOPES:  kategorie = ...        -> Name (roh+ext-strip) + concat-hay (default)
#              kategorie@name = ...   -> NUR Release-Name (roh+ext-strip); fuer ^/$-Anker
#              kategorie@files = ...  -> NUR einzelne Dateinamen; fuer Audio-Extensions am Ende
#   - INNERHALB einer Gruppe gewinnt die ERSTE passende Regel (von oben). -> mutually exclusive
#   - UEBER Gruppen hinweg additiv: ein Release kann in EINER Kategorie JE Gruppe landen.
#     => ein "Film 2024 1080p x264" liegt in  movies (Gruppe media)  UND  movies_1080p_264
#        (Gruppe media_1080p_264)  UND  __all__ (Gruppe all)  gleichzeitig.
#   - Was in einer Gruppe zu KEINER Regel passt, taucht in dieser Gruppe nicht auf
#     (Gruppe media hat 'movies = .*' als catch-all, landet also nie im Leeren -> sonst "other").
#   - Aenderungen wirken nach:  docker compose up -d torbox_webdav   (+ ggf. rclone vfs/refresh)
#
# Plex: pro Gruppe eine Library-Location moeglich, z.B.
#   Filme        -> /mnt/torbox-fast/movies
#   Filme 1080p  -> /mnt/torbox-fast/movies_1080p_264
#   Serien       -> /mnt/torbox-fast/shows
#   Serien 1080p -> /mnt/torbox-fast/shows_1080p_264

[media]
shows  = (s\d{1,2}[ ._-]?e\d{1,3}|\b\d{1,2}x\d{2}\b|\bs\d{1,2}\b|season[ ._-]?\d|complete[ ._-]?series)
# Music: mehrere Zeilen = ODER (first-match in der Gruppe). Music-Video-Regeln portiert
# aus zurg config.yml (Houdini-Fix 2026-06-06).
# Audio-Format-MARKER im Namen — AAC bewusst NICHT (Codec-Tag in Movie-Releases)
music  = \b(flac|mp3|\d{3}\s?kbps|24[ -]?bit|web[ -]?flac|vinyl|discography|ost|soundtrack)\b
# Echte Audio-DATEIEN: Extension am Datei-ENDE (".AAC5.1"-Codec-Tags matchen so nicht)
music@files = \.(m4a|flac|mp3|wav|aac|ogg|opus)$
# "Official (Music) Video" / "Lyric Video" / " MV "
music  = \b(official\s?(music\s?)?video|music\s?video|lyric\s?video|\smv\s)\b
# Album/EP/Single mit Jahr
music  = \b(album|ep|single|lp|mixtape)\s*[\(\[]?\d{4}[\)\]]?
# "Artist - Year - Title" (Peter Fox - 2008 - Stadtaffe)
music@name = [a-z][a-z &.']{2,}\s*-\s*(19|20)\d{2}\s*-
# "Artist - Title - Year" am ENDE
music@name = -\s*(19|20)\d{2}\s*$
# "Artist - Title (Year)" / "[Year]" am ENDE (Movies haben quality NACH dem Jahr -> kein Match)
music@name = \s[\(\[](19|20)\d{2}[\)\]]\s*$
# "Artist - Title (Wort)" am ENDE: "(Blue)", "(Remix)", "(Acoustic)"
music@name = \s\([a-z][a-z]+\)\s*$
# Pure "Artist - Title" ohne JEDE Ziffer (kein year/quality) -> "Dua Lipa - Houdini"
music@name = ^[a-z][a-z &.,']+\s-\s[a-z][a-z &.,']+$
movies = .*

# Qualitaets-Spiegel (wie zurg media_1080p_264): nur 1080p + x264/h264/avc.
# shows_1080p_264 steht ZUERST (sonst landet eine 1080p-x264-Serie faelschlich in movies_1080p_264).
[media_1080p_264]
shows_1080p_264  = (?=.*(s\d{1,2}[ ._-]?e\d{1,3}|\b\d{1,2}x\d{2}\b|\bs\d{1,2}\b|season[ ._-]?\d|complete[ ._-]?series))(?=.*\b1080p\b)(?=.*\b(x264|h[ ._-]?264|avc)\b)
movies_1080p_264 = (?=.*\b1080p\b)(?=.*\b(x264|h[ ._-]?264|avc)\b)

# Flacher Voll-View (wie zurg/__all__) — fuer die cli_debrid-Union.
[all]
__all__ = .*
